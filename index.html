<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#06121d" />
  <title>SKYFIRE: NEO ASSAULT</title>
  <style>
    :root {
      --ink: #e9fbff;
      --muted: #86a9b7;
      --cyan: #65f2ff;
      --cyan-2: #17a8d7;
      --red: #ff4268;
      --amber: #ffcf5c;
      --panel: rgba(6, 20, 31, 0.74);
      --line: rgba(130, 226, 255, 0.22);
      --shadow: rgba(0, 0, 0, 0.48);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #02070c; font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); touch-action: none; }
    button { font: inherit; }

    #app { position: fixed; inset: 0; display: grid; place-items: center; background:
      radial-gradient(circle at 50% 20%, rgba(31, 94, 119, .22), transparent 48%),
      linear-gradient(#07131d, #02070c 72%); }

    #frame { position: relative; width: min(100vw, 562.5px); height: 100vh; max-height: 100vh; overflow: hidden; background: #06121d; box-shadow: 0 0 90px rgba(0,0,0,.88); isolation: isolate; }
    canvas { display: block; width: 100%; height: 100%; }

    .overlay { position: absolute; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; padding: 22px; transition: opacity .32s ease, visibility .32s ease; }
    .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .menu-shade { background: linear-gradient(180deg, rgba(0,6,12,.22), rgba(0,6,12,.78) 62%, rgba(0,4,8,.95)); }

    .menu-card { width: min(100%, 470px); text-align: center; position: relative; }
    .kicker { letter-spacing: .38em; font-size: 11px; color: #72eaff; opacity: .9; margin-bottom: 11px; text-transform: uppercase; }
    .title { margin: 0; font-size: clamp(41px, 10vw, 68px); line-height: .88; letter-spacing: -.065em; font-weight: 900; text-shadow: 0 0 30px rgba(71,231,255,.2), 0 3px 0 rgba(0,0,0,.42); }
    .title span { display: block; font-size: .37em; letter-spacing: .25em; margin-top: 12px; color: #8feeff; }
    .subtitle { margin: 22px auto 25px; max-width: 350px; color: #a6c5ce; line-height: 1.7; font-size: 13px; }

    .start-btn { position: relative; width: min(100%, 310px); min-height: 58px; border: 1px solid rgba(115,240,255,.62); color: white; cursor: pointer; background:
      linear-gradient(90deg, transparent, rgba(107,239,255,.16), transparent),
      rgba(2,24,35,.78); clip-path: polygon(8% 0, 92% 0, 100% 50%, 92% 100%, 8% 100%, 0 50%); text-transform: uppercase; letter-spacing: .18em; font-weight: 800; box-shadow: 0 0 30px rgba(52,208,238,.13) inset; -webkit-tap-highlight-color: transparent; }
    .start-btn:active { transform: translateY(1px) scale(.99); background-color: rgba(22,83,99,.85); }
    .start-btn::before, .start-btn::after { content: ""; position: absolute; top: 50%; width: 32px; height: 1px; background: #58e9ff; box-shadow: 0 0 9px #58e9ff; }
    .start-btn::before { right: calc(100% + 13px); } .start-btn::after { left: calc(100% + 13px); }

    .controls { margin: 24px auto 0; display: flex; justify-content: center; gap: 17px; color: #7796a1; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; flex-wrap: wrap; }
    .controls b { color: #c4ebf0; font-weight: 700; }

    #hud { position: absolute; z-index: 5; inset: 0; pointer-events: none; opacity: 0; transition: opacity .25s ease; }
    #hud.visible { opacity: 1; }
    .hud-top { position: absolute; top: max(12px, env(safe-area-inset-top)); left: 15px; right: 15px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: start; gap: 8px; text-shadow: 0 2px 5px #000; }
    .hud-block { min-width: 0; }
    .hud-label { color: #66deef; font-size: 8px; letter-spacing: .2em; text-transform: uppercase; opacity: .85; }
    .hud-value { font-size: 19px; font-weight: 900; letter-spacing: .02em; margin-top: 2px; }
    .hud-center { text-align: center; }
    .hud-right { text-align: right; }
    .stage-line { height: 2px; width: 92px; background: rgba(255,255,255,.16); margin: 5px auto 0; overflow: hidden; }
    #stage-fill { width: 0%; height: 100%; background: #71eaff; box-shadow: 0 0 8px #71eaff; }

    .life-row { display: flex; gap: 4px; margin-top: 4px; justify-content: flex-end; }
    .life { width: 13px; height: 8px; background: #ff4969; clip-path: polygon(50% 0,100% 100%,50% 74%,0 100%); filter: drop-shadow(0 0 3px rgba(255,65,104,.8)); }

    .weapon-panel { position: absolute; bottom: max(13px, env(safe-area-inset-bottom)); left: 13px; display: flex; align-items: flex-end; gap: 9px; }
    .weapon-icon { width: 47px; height: 47px; border: 1px solid rgba(97,225,241,.35); background: rgba(4,18,28,.62); display: grid; place-items: center; transform: rotate(45deg); box-shadow: inset 0 0 18px rgba(72,209,237,.1); }
    .weapon-icon i { display: block; width: 18px; height: 27px; transform: rotate(-45deg); background: linear-gradient(#fff, #65edff); clip-path: polygon(50% 0,100% 100%,50% 76%,0 100%); filter: drop-shadow(0 0 5px #65edff); }
    .weapon-copy { margin-bottom: 1px; }
    .weapon-copy strong { display: block; font-size: 11px; letter-spacing: .11em; }
    .power-bars { display: flex; gap: 3px; margin-top: 5px; }
    .power-bars i { width: 15px; height: 3px; background: rgba(255,255,255,.18); }
    .power-bars i.on { background: #68e8f6; box-shadow: 0 0 5px #68e8f6; }

    .bomb-panel { position: absolute; right: 13px; bottom: max(13px, env(safe-area-inset-bottom)); text-align: right; }
    .bombs { display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px; }
    .bomb { width: 15px; height: 15px; border: 1px solid #ffce5f; transform: rotate(45deg); box-shadow: 0 0 7px rgba(255,199,75,.3); background: radial-gradient(circle, #fff4bd, #ffb738 52%, transparent 58%); }

    #mobile-bomb { pointer-events: auto; position: absolute; right: 18px; bottom: calc(max(73px, env(safe-area-inset-bottom) + 73px)); width: 68px; height: 68px; border-radius: 50%; border: 1px solid rgba(255,199,77,.48); background: radial-gradient(circle, rgba(255,186,44,.19), rgba(25,18,3,.64) 66%); color: #ffd86f; font-weight: 900; font-size: 10px; letter-spacing: .08em; opacity: .7; display: none; -webkit-tap-highlight-color: transparent; }
    #mobile-bomb:active { transform: scale(.94); opacity: 1; }

    #pause-btn, #mute-btn { pointer-events: auto; position: absolute; top: max(68px, env(safe-area-inset-top) + 56px); width: 34px; height: 34px; border: 1px solid rgba(109,215,231,.22); background: rgba(4,18,28,.42); color: #a8d3da; display: grid; place-items: center; cursor: pointer; }
    #pause-btn { right: 13px; } #mute-btn { left: 13px; }

    .message { position: absolute; z-index: 6; left: 50%; top: 30%; transform: translate(-50%,-50%); text-align: center; text-transform: uppercase; opacity: 0; pointer-events: none; text-shadow: 0 3px 15px #000; white-space: nowrap; }
    .message.show { animation: msg 2.35s ease both; }
    .message b { display: block; font-size: clamp(26px, 7vw, 43px); letter-spacing: .1em; }
    .message span { color: #7feaf8; letter-spacing: .3em; font-size: 9px; }
    @keyframes msg { 0%{opacity:0; transform:translate(-50%,-30%) scale(.9)} 13%,68%{opacity:1; transform:translate(-50%,-50%) scale(1)} 100%{opacity:0; transform:translate(-50%,-65%) scale(1.04)} }

    .boss-ui { position: absolute; z-index: 5; top: max(76px, env(safe-area-inset-top) + 64px); left: 50%; transform: translateX(-50%); width: min(78%, 400px); opacity: 0; transition: opacity .3s; pointer-events: none; }
    .boss-ui.show { opacity: 1; }
    .boss-name { display:flex; justify-content:space-between; font-size:9px; letter-spacing:.16em; color:#ff91a4; margin-bottom:5px; }
    .boss-track { height: 7px; border: 1px solid rgba(255,86,115,.55); padding: 1px; background: rgba(8,5,9,.64); }
    #boss-fill { height:100%; width:100%; background: linear-gradient(90deg,#ff315d,#ff9b63); box-shadow:0 0 10px rgba(255,49,93,.55); }

    .result-card { width: min(100%, 410px); padding: 28px 24px 25px; border-top: 1px solid rgba(103,235,255,.55); border-bottom: 1px solid rgba(103,235,255,.26); background: linear-gradient(90deg, transparent, rgba(5,26,37,.86) 12%, rgba(5,26,37,.92) 88%, transparent); text-align: center; }
    .result-card h2 { font-size: 30px; margin:0 0 6px; letter-spacing:.1em; }
    .result-card p { color:#84a9b4; font-size:11px; letter-spacing:.14em; margin:0 0 22px; }
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:rgba(99,215,232,.12); margin-bottom:22px; }
    .stat { background:#071924; padding:15px 8px; }
    .stat small { display:block; color:#66909b; font-size:8px; letter-spacing:.16em; text-transform:uppercase; }
    .stat b { display:block; margin-top:5px; font-size:19px; }

    #fatal { display:none; position:absolute; z-index:99; inset:0; background:#07131d; color:white; padding:28px; align-items:center; justify-content:center; text-align:center; line-height:1.7; }
    #fatal.show { display:flex; }

    @media (pointer: coarse), (max-width: 720px) { #mobile-bomb { display:block; } .controls { gap:9px 14px; } #frame { width:100vw; } }
    @media (min-aspect-ratio: 3/4) and (max-height: 650px) { .subtitle{margin:14px auto 17px}.controls{margin-top:15px}.title{font-size:42px} }
  </style>
</head>
<body>
<div id="app"><div id="frame">
  <canvas id="game"></canvas>
  <div id="hud">
    <div class="hud-top">
      <div class="hud-block"><div class="hud-label">score</div><div class="hud-value" id="score">0000000</div></div>
      <div class="hud-block hud-center"><div class="hud-label" id="stage-label">stage 01</div><div class="stage-line"><div id="stage-fill"></div></div></div>
      <div class="hud-block hud-right"><div class="hud-label">airframe</div><div class="life-row" id="lives"></div></div>
    </div>
    <button id="mute-btn" aria-label="静音">♪</button><button id="pause-btn" aria-label="暂停">Ⅱ</button>
    <div class="weapon-panel"><div class="weapon-icon"><i></i></div><div class="weapon-copy"><strong id="weapon-name">R-VULCAN</strong><div class="power-bars" id="power-bars"></div></div></div>
    <div class="bomb-panel"><div class="hud-label">nova</div><div class="bombs" id="bombs"></div></div>
    <button id="mobile-bomb">NOVA</button>
  </div>
  <div class="boss-ui" id="boss-ui"><div class="boss-name"><span id="boss-name">DREADNOUGHT</span><span id="boss-phase">PHASE 1</span></div><div class="boss-track"><div id="boss-fill"></div></div></div>
  <div class="message" id="message"><b></b><span></span></div>

  <div class="overlay menu-shade" id="menu">
    <div class="menu-card">
      <div class="kicker">orbital defense force</div>
      <h1 class="title">SKYFIRE<span>NEO ASSAULT</span></h1>
      <p class="subtitle">突破敌军轨道封锁。升级双制式武器，击穿重型编队，并摧毁深海指挥舰。</p>
      <button class="start-btn" id="start-btn">启动战机</button>
      <div class="controls"><span><b>移动</b> 拖动 / WASD</span><span><b>炸弹</b> 空格</span><span><b>精确</b> Shift</span><span><b>暂停</b> P</span></div>
    </div>
  </div>

  <div class="overlay menu-shade hidden" id="result"><div class="result-card"><h2 id="result-title">MISSION FAILED</h2><p id="result-sub">AIRFRAME SIGNAL LOST</p><div class="stats"><div class="stat"><small>final score</small><b id="final-score">0</b></div><div class="stat"><small>best combo</small><b id="final-combo">×1</b></div><div class="stat"><small>destroyed</small><b id="final-kills">0</b></div><div class="stat"><small>stage</small><b id="final-stage">01</b></div></div><button class="start-btn" id="restart-btn">再次出击</button></div></div>
  <div id="fatal"><div><b>游戏初始化失败</b><br><span id="fatal-copy"></span></div></div>
</div></div>
<script>
(() => {
'use strict';
const $ = s => document.querySelector(s);
const canvas=$('#game'), ctx=canvas.getContext('2d',{alpha:false});
const frame=$('#frame'), menu=$('#menu'), result=$('#result'), hud=$('#hud');
const W=450,H=800, TAU=Math.PI*2;
let dpr=1, scale=1, offX=0, offY=0, cw=450,ch=800;
function resize(){
  const r=frame.getBoundingClientRect(); dpr=Math.min(devicePixelRatio||1,2);
  canvas.width=Math.round(r.width*dpr); canvas.height=Math.round(r.height*dpr);
  canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';
  cw=canvas.width;ch=canvas.height; scale=Math.max(cw/W,ch/H); offX=(cw-W*scale)/2;offY=(ch-H*scale)/2;
}
addEventListener('resize',resize,{passive:true});resize();

const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), rnd=(a,b)=>a+Math.random()*(b-a), choose=a=>a[Math.random()*a.length|0];
const dist2=(a,b)=>{const x=a.x-b.x,y=a.y-b.y;return x*x+y*y};

class AudioFX{
  constructor(){this.ctx=null;this.master=null;this.muted=false;this.failed=false;}
  init(){
    if(this.ctx||this.failed)return !!this.ctx;
    try{
      const A=window.AudioContext||window.webkitAudioContext;
      if(!A){this.failed=true;return false}
      this.ctx=new A();this.master=this.ctx.createGain();this.master.gain.value=.20;this.master.connect(this.ctx.destination);
      if(this.ctx.state==='suspended') this.ctx.resume().catch(()=>{});
      return true;
    }catch(e){this.failed=true;this.ctx=null;this.master=null;this.muted=true;return false}
  }
  tone(f=220,d=.07,type='sine',vol=.16,slide=0){
    if(this.muted||!this.init()||!this.ctx||!this.master)return;
    try{const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=type;o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(Math.max(20,f+slide),t+d);g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.connect(g);g.connect(this.master);o.start(t);o.stop(t+d+.01)}catch(e){}
  }
  shot(){this.tone(520,.035,'square',.035,-150)} hit(){this.tone(110,.07,'sawtooth',.07,-70)}
  boom(big=false){this.tone(big?70:105,big?.55:.22,'sawtooth',big?.28:.13,-50);setTimeout(()=>this.tone(big?42:62,big?.42:.15,'square',big?.16:.07,-20),40)}
  pick(){this.tone(620,.12,'sine',.13,420)} bomb(){this.tone(90,.85,'sawtooth',.34,-65)}
  toggle(){this.muted=!this.muted;$('#mute-btn').textContent=this.muted?'×':'♪'}
}
const audio=new AudioFX();

let game;
class Game{
 constructor(){this.stars=[];this.clouds=[];this.particles=[];this.bullets=[];this.enemyBullets=[];this.enemies=[];this.pickups=[];this.shocks=[];this.terrain=[];this.input={x:W/2,y:H*.8,active:false,keys:{}};this.high=+(localStorage.getItem('skyfireHigh')||0);this.initBackdrop();this.reset();}
 initBackdrop(){for(let i=0;i<85;i++)this.stars.push({x:rnd(0,W),y:rnd(0,H),z:rnd(.2,1),s:rnd(.5,2)});for(let i=0;i<7;i++)this.clouds.push({x:rnd(-150,W),y:rnd(0,H),s:rnd(.7,1.7),a:rnd(.025,.08)});for(let i=0;i<12;i++)this.terrain.push(this.makeIsland(rnd(-50,W),rnd(0,H),rnd(30,100)));}
 makeIsland(x,y,r){const pts=[];for(let i=0;i<12;i++){let a=i/12*TAU,rr=r*rnd(.65,1.1);pts.push([Math.cos(a)*rr,Math.sin(a)*rr*.48])}return{x,y,r,pts,detail:Math.random()}}
 reset(){this.state='menu';this.time=0;this.stage=1;this.stageTime=0;this.score=0;this.combo=1;this.comboTimer=0;this.bestCombo=1;this.kills=0;this.spawnTimer=.5;this.wave=0;this.shake=0;this.flash=0;this.boss=null;this.stageClear=false;this.player={x:W/2,y:H*.82,r:12,lives:3,bombs:3,power:1,weapon:'red',inv:2,fire:0,shield:0,trail:[],wingmen:0};this.bullets=[];this.enemyBullets=[];this.enemies=[];this.pickups=[];this.particles=[];this.shocks=[];this.updateHud();}
 start(){
   this.reset(); this.state='playing'; menu.classList.add('hidden');result.classList.add('hidden');hud.classList.add('visible');
   this.input.x=this.player.x;this.input.y=this.player.y; this.showMsg('STAGE 01','BREAK THE BLOCKADE');
 }
 restart(){this.start()}
 pause(){if(this.state==='playing'){this.state='paused';this.showMsg('PAUSED','PRESS P TO RESUME')}else if(this.state==='paused'){this.state='playing'}}
 showMsg(a,b){const m=$('#message');m.querySelector('b').textContent=a;m.querySelector('span').textContent=b;m.classList.remove('show');void m.offsetWidth;m.classList.add('show')}
 update(dt){
  this.time+=dt;this.updateBackdrop(dt);
  if(this.state!=='playing')return;
  dt=Math.min(dt,.034);this.stageTime+=dt;this.shake=Math.max(0,this.shake-dt*16);this.flash=Math.max(0,this.flash-dt*2.4);
  this.updatePlayer(dt);this.spawn(dt);this.enemies.forEach(e=>this.updateEnemy(e,dt));this.bullets.forEach(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt});this.enemyBullets.forEach(b=>this.updateEnemyBullet(b,dt));this.pickups.forEach(p=>this.updatePickup(p,dt));this.updateParticles(dt);this.collisions();this.cleanup();
  this.comboTimer-=dt;if(this.comboTimer<=0)this.combo=1;
  if(!this.boss&&!this.stageClear&&this.stageTime>48)this.spawnBoss();
  this.updateHud();
 }
 updateBackdrop(dt){this.stars.forEach(s=>{s.y+=18*s.z*dt;if(s.y>H){s.y=0;s.x=rnd(0,W)}});this.clouds.forEach(c=>{c.y+=12*c.s*dt;c.x+=2*dt;if(c.y>H+100){c.y=-100;c.x=rnd(-100,W)}});this.terrain.forEach(t=>{t.y+=24*dt;if(t.y>H+t.r){Object.assign(t,this.makeIsland(rnd(-40,W),-t.r,rnd(30,100)))}})}
 updatePlayer(dt){const p=this.player,k=this.input.keys;let dx=(k.ArrowRight||k.d?1:0)-(k.ArrowLeft||k.a?1:0),dy=(k.ArrowDown||k.s?1:0)-(k.ArrowUp||k.w?1:0);if(dx||dy){let l=Math.hypot(dx,dy);dx/=l;dy/=l;let sp=k.Shift?160:290;p.x+=dx*sp*dt;p.y+=dy*sp*dt}else if(this.input.active){p.x+=(this.input.x-p.x)*Math.min(1,dt*18);p.y+=(this.input.y-p.y)*Math.min(1,dt*18)}p.x=clamp(p.x,24,W-24);p.y=clamp(p.y,88,H-48);p.inv=Math.max(0,p.inv-dt);p.shield=Math.max(0,p.shield-dt);p.fire-=dt;if(p.fire<=0){this.firePlayer();p.fire=.13-Math.min(.055,p.power*.01)}p.trail.push({x:p.x,y:p.y+20,l:.26});if(p.trail.length>18)p.trail.shift()}
 firePlayer(){const p=this.player,lev=p.power,red=p.weapon==='red';if(red){let n=1+Math.floor(lev/2);for(let i=0;i<n;i++){let a=(i-(n-1)/2)*.10;this.bullets.push({x:p.x+(i-(n-1)/2)*8,y:p.y-21,vx:Math.sin(a)*300,vy:-610,life:1.3,r:3,dmg:1.35,color:'#ff4569'})}}else{this.bullets.push({x:p.x,y:p.y-24,vx:0,vy:-760,life:1.1,r:4,dmg:2.25,color:'#5feeff',pierce:2+Math.floor(lev/2)});if(lev>=3){this.bullets.push({x:p.x-11,y:p.y-17,vx:-20,vy:-680,life:1.2,r:2,dmg:.8,color:'#9af7ff'},{x:p.x+11,y:p.y-17,vx:20,vy:-680,life:1.2,r:2,dmg:.8,color:'#9af7ff'})}}for(let i=0;i<p.wingmen;i++){let side=i?1:-1;this.bullets.push({x:p.x+side*34,y:p.y-4,vx:side*15,vy:-590,life:1.2,r:2.5,dmg:1,color:red?'#ff7890':'#76efff'})}if((this.time*10|0)%2===0)audio.shot()}
 spawn(dt){if(this.boss||this.stageClear)return;this.spawnTimer-=dt;if(this.spawnTimer>0)return;this.wave++;let type=this.wave%8; if(type===0)this.spawnFormation('v');else if(type===2)this.spawnFormation('line');else if(type===4)this.spawnFormation('sweep');else if(type===6)this.spawnEnemy('carrier',rnd(80,W-80),-50);else {this.spawnEnemy(choose(['dart','fighter','bomber']),rnd(35,W-35),-35)}this.spawnTimer=Math.max(.7,2.2-this.stage*.13)+rnd(0,.65)}
 spawnFormation(kind){let n=kind==='line'?6:5;for(let i=0;i<n;i++){let x=kind==='v'?W/2+(i-(n-1)/2)*52:kind==='line'?42+i*(W-84)/(n-1):(i%2?W+25:-25);let y=kind==='v'?-30-Math.abs(i-(n-1)/2)*22:-25-i*20;this.spawnEnemy(kind==='sweep'?'dart':'fighter',x,y,{delay:i*.12,dir:kind==='sweep'?(i%2?-1:1):0})}}
 spawnEnemy(type,x,y,extra={}){let cfg={dart:[2,120,13,90],fighter:[5,72,17,160],bomber:[12,46,23,340],carrier:[32,31,31,800]}[type];this.enemies.push({type,x,y,spawnX:x,hp:cfg[0]+this.stage*.5,max:cfg[0]+this.stage*.5,speed:cfg[1]+this.stage*5,r:cfg[2],score:cfg[3],t:0,fire:rnd(.5,1.7),delay:extra.delay||0,dir:extra.dir||0,phase:rnd(0,TAU),dead:false})}

 drawEnemy(e){if(e.delay>0)return;ctx.save();ctx.translate(e.x,e.y);if(e.type==='dart')ctx.rotate(Math.sin(e.t*4)*.2);let grad=ctx.createLinearGradient(0,-e.r,0,e.r);grad.addColorStop(0,e.type==='carrier'?'#d4ac87':'#d96a72');grad.addColorStop(.45,e.type==='carrier'?'#6a3a38':'#72283b');grad.addColorStop(1,'#251826');ctx.fillStyle=grad;ctx.strokeStyle='#ff7184';ctx.lineWidth=1;if(e.type==='fighter'||e.type==='dart'){ctx.beginPath();ctx.moveTo(0,e.r);ctx.lineTo(e.r*.45,-e.r*.65);ctx.lineTo(e.r*1.45,-e.r*.1);ctx.lineTo(e.r*.55,-e.r);ctx.lineTo(0,-e.r*.5);ctx.lineTo(-e.r*.55,-e.r);ctx.lineTo(-e.r*1.45,-e.r*.1);ctx.lineTo(-e.r*.45,-e.r*.65);ctx.closePath()}else{ctx.beginPath();ctx.moveTo(0,e.r);ctx.lineTo(e.r*.7,e.r*.4);ctx.lineTo(e.r*1.3,-e.r*.1);ctx.lineTo(e.r*.65,-e.r*.85);ctx.lineTo(0,-e.r);ctx.lineTo(-e.r*.65,-e.r*.85);ctx.lineTo(-e.r*1.3,-e.r*.1);ctx.lineTo(-e.r*.7,e.r*.4);ctx.closePath()}ctx.fill();ctx.stroke();ctx.fillStyle='#ffb052';ctx.fillRect(-2,-e.r*.15,4,9);if(e.hp<e.max&&e.r>18){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(-e.r,e.r+7,e.r*2,3);ctx.fillStyle='#ff4c68';ctx.fillRect(-e.r,e.r+7,e.r*2*e.hp/e.max,3)}ctx.restore()}

try{game=new Game();window.__skyfire=game;}catch(err){$('#fatal').classList.add('show');$('#fatal-copy').textContent=String(err?.message||err);return}

function pointerPos(e){const r=canvas.getBoundingClientRect(),touch=e.touches?.[0]||e.changedTouches?.[0]||e;let px=(touch.clientX-r.left)*dpr,py=(touch.clientY-r.top)*dpr;return{x:(px-offX)/scale,y:(py-offY)/scale}}
canvas.addEventListener('pointerdown',e=>{if(game.state==='playing'){game.input.active=true;Object.assign(game.input,pointerPos(e));e.preventDefault()}},{passive:false});
canvas.addEventListener('pointermove',e=>{if(game.input.active){Object.assign(game.input,pointerPos(e));e.preventDefault()}},{passive:false});
addEventListener('pointerup',()=>game.input.active=false,{passive:true});
addEventListener('keydown',e=>{game.input.keys[e.key]=true;if(e.code==='Space'){e.preventDefault();game.bomb()}if(e.key.toLowerCase()==='p')game.pause();if(e.key.toLowerCase()==='m')audio.toggle()});
addEventListener('keyup',e=>game.input.keys[e.key]=false);

function safeStart(){
  try{game.start()}catch(err){$('#fatal').classList.add('show');$('#fatal-copy').textContent='启动失败：'+String(err?.message||err);return}
  try{audio.init()}catch(e){}
}
function bindTap(el,fn){
  let touched=false;
  el.addEventListener('touchend',e=>{touched=true;e.preventDefault();fn();setTimeout(()=>touched=false,500)},{passive:false});
  el.addEventListener('click',e=>{e.preventDefault();if(!touched)fn()});
}
bindTap($('#start-btn'),safeStart);bindTap($('#restart-btn'),()=>{try{game.restart();audio.init()}catch(e){}});bindTap($('#mobile-bomb'),()=>game.bomb());bindTap($('#pause-btn'),()=>game.pause());bindTap($('#mute-btn'),()=>audio.toggle());

let last=performance.now();function loop(now){let dt=(now-last)/1000;last=now;try{game.update(dt);game.render()}catch(err){console.error(err)}requestAnimationFrame(loop)}requestAnimationFrame(loop);
})();
</script>
