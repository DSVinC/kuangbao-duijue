name: Extract R5 Source

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/extract-r5-source.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct R5 source
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, gzip

          names = [
              'r5/part-00.b64',
              'r5/part-01.b64',
              'r5/part-020.b64',
              'r5/part-021.b64',
              'r5/part-022.b64',
              'r5/part-023.b64',
              'r5/part-03.b64',
              'r5/part-04.b64',
          ]
          payload = ''.join(Path(name).read_text(encoding='utf-8').strip() for name in names)
          source = gzip.decompress(base64.b64decode(payload)).decode('utf-8')
          out = Path('src/r5-source.html')
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(source, encoding='utf-8')
          print('wrote', out, len(source))
          PY
      - name: Commit extracted source
        run: |
          git config user.name 'skyfire-build-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add src/r5-source.html
          if git diff --cached --quiet; then
            echo 'No source changes'
          else
            git commit -m 'Extract R5 source for development [skip ci]'
            git push
          fi
