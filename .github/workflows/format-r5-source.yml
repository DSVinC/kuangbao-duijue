name: Format R5 Source

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/format-r5-source.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Format extracted source
        run: |
          cp src/r5-source.html src/r5-source.pretty.html
          npx --yes prettier@3.3.3 --write src/r5-source.pretty.html
      - name: Commit formatted source
        run: |
          git config user.name 'skyfire-build-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add src/r5-source.pretty.html
          if git diff --cached --quiet; then
            echo 'No formatted source changes'
          else
            git commit -m 'Format R5 source for development [skip ci]'
            git push
          fi
